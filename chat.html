<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributed Llama Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c63ff;
      --accent-dim: #4e47c4;
      --user-bg: #1e3a5f;
      --user-border: #2a5298;
      --ai-bg: #1a2535;
      --ai-border: #2e3250;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --input-bg: #141720;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .model-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      max-width: 340px;
    }

    .model-badge .model-label {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .model-badge .model-name {
      color: #a78bfa;
      font-family: 'Courier New', monospace;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Config bar ── */
    .config-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .config-bar label {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .config-bar input[type="text"],
    .config-bar input[type="number"] {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.82rem;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .config-bar input[type="text"] { width: 220px; }
    .config-bar input[type="number"] { width: 80px; }

    .config-bar input:focus { border-color: var(--accent); }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      user-select: none;
    }

    .empty-state .icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .empty-state p {
      font-size: 0.85rem;
      opacity: 0.6;
    }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* User messages → right-aligned */
    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    /* AI messages → left-aligned */
    .msg-row.ai {
      align-self: flex-start;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-top: 2px;
    }

    .msg-row.user .avatar {
      background: var(--user-border);
    }

    .msg-row.ai .avatar {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
    }

    .bubble {
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 0.92rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: calc(100% - 52px);
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-top-right-radius: 4px;
      color: #c8deff;
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-top-left-radius: 4px;
    }

    /* Streaming cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      border-radius: 1px;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Error message ── */
    .error-row {
      align-self: center;
      background: #2d1a1a;
      border: 1px solid #6b2f2f;
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #f87171;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    /* ── Input bar ── */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.94rem;
      line-height: 1.5;
      padding: 12px 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      max-height: 160px;
      overflow-y: auto;
      min-height: 48px;
    }

    #user-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.18);
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:disabled { opacity: 0.5; }

    #send-btn {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 2px 10px rgba(108,99,255,0.35);
    }

    #send-btn:hover:not(:disabled) { opacity: 0.9; transform: scale(1.05); }
    #send-btn:active:not(:disabled) { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Worker nodes panel ── */
    .nodes-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nodes-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .nodes-panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .nodes-refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 0.72rem;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .nodes-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nodes-refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .nodes-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .node-card {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      min-width: 180px;
      flex: 1 1 180px;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.2s;
    }

    .node-card:hover { border-color: var(--accent); }

    .node-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-metrics {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .node-metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .node-metric-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .node-metric-value {
      font-size: 0.72rem;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      color: #a78bfa;
      white-space: nowrap;
    }

    .node-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }

    .node-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      transition: width 0.4s ease;
    }

    .nodes-status {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Scrollbar styling ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3e4570; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="model-badge" id="model-badge">
      <span class="model-label">Model:</span>
      <span class="model-name" id="model-name">—</span>
    </div>
  </header>

  <!-- Config bar -->
  <div class="config-bar">
    <label>
      API URL
      <input type="text" id="api-url" value="http://localhost:9999/v1/chat/completions" />
    </label>
    <label>
      Gateway URL
      <input type="text" id="gateway-url" value="https://chat.123.243.95.71.sslip.io/api/gateway" />
    </label>
    <label>
      Max tokens
      <input type="number" id="max-tokens" value="512" min="1" max="8192" />
    </label>
    <label>
      Temperature
      <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1" />
    </label>
  </div>

  <!-- Worker nodes panel -->
  <div class="nodes-panel">
    <div class="nodes-panel-header">
      <span class="nodes-panel-title">⚡ Worker Nodes</span>
      <button class="nodes-refresh-btn" id="nodes-refresh-btn" onclick="fetchNodeStats()">↻ Refresh</button>
    </div>
    <div class="nodes-grid" id="nodes-grid">
      <span class="nodes-status" id="nodes-status">Fetching node info…</span>
    </div>
  </div>

  <!-- Chat area -->
  <div id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <h2>Start a conversation</h2>
      <p>Type a message below and press Enter or click Send.</p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
    ></textarea>
    <button id="send-btn" title="Send">&#9658;</button>
  </div>

  <script>
    const chatArea   = document.getElementById('chat-area');
    const emptyState = document.getElementById('empty-state');
    const userInput  = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const modelNameEl = document.getElementById('model-name');

    // ── Model info ────────────────────────────────────────────────────────────
    async function fetchModelInfo() {
      const apiUrl = document.getElementById('api-url').value.trim();
      if (!apiUrl) return;

      // Derive base URL: strip path down to the root (scheme + host + port)
      let baseUrl;
      try {
        const u = new URL(apiUrl);
        baseUrl = u.origin;
      } catch {
        return;
      }

      try {
        const res = await fetch(`${baseUrl}/v1/models`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        // OpenAI-compatible: { data: [{ id, ... }] }
        const modelId = data?.data?.[0]?.id ?? data?.id ?? null;
        if (modelId) {
          modelNameEl.textContent = modelId;
          modelNameEl.title = modelId;
        } else {
          modelNameEl.textContent = '(unknown)';
        }
      } catch {
        modelNameEl.textContent = 'unavailable';
      }
    }

    // Re-fetch model info when API URL changes (with debounce)
    let apiUrlDebounce;
    document.getElementById('api-url').addEventListener('input', () => {
      clearTimeout(apiUrlDebounce);
      modelNameEl.textContent = '…';
      apiUrlDebounce = setTimeout(fetchModelInfo, 600);
    });

    // Fetch on load
    fetchModelInfo();

    // Conversation history sent to API on each request
    const history = [];

    // ── Worker node stats ─────────────────────────────────────────────────────
    const nodesGrid      = document.getElementById('nodes-grid');
    const nodesStatus    = document.getElementById('nodes-status');
    const nodesRefreshBtn = document.getElementById('nodes-refresh-btn');

    let fetchInFlight = false;

    async function fetchNodeStats() {
      if (fetchInFlight) return; // skip tick if previous request still pending
      const gatewayUrl = document.getElementById('gateway-url').value.trim().replace(/\/$/, '');
      if (!gatewayUrl) return;

      fetchInFlight = true;
      nodesRefreshBtn.disabled = true;
      nodesRefreshBtn.textContent = '↻ …';
      // Only show "Fetching…" on the very first load (grid is empty)
      if (nodesGrid.children.length === 0) {
        nodesGrid.innerHTML = '<span class="nodes-status">Fetching…</span>';
      }

      // Use a short timeout so poll requests are always released well within
      // the 1s poll interval and never hold open connections long enough to
      // starve the SSE stream (browsers allow ~6 concurrent connections per origin).
      const abort = new AbortController();
      const timeoutId = setTimeout(() => abort.abort(), 800);

      try {
        const [staticRes, allRes] = await Promise.all([
          fetch(`${gatewayUrl}/api/compute/static`, { signal: abort.signal }),
          fetch(`${gatewayUrl}/api/compute/all`,    { signal: abort.signal }),
        ]);

        if (!staticRes.ok) throw new Error(`/api/compute/static → HTTP ${staticRes.status}`);
        if (!allRes.ok)    throw new Error(`/api/compute/all → HTTP ${allRes.status}`);

        const staticData = await staticRes.json(); // [{name, cost}, ...]
        const allData    = await allRes.json();     // [{name, cost}, ...]

        // Index by name for quick lookup
        const staticMap = Object.fromEntries(staticData.map(n => [n.name, parseFloat(n.cost)]));
        const allMap    = Object.fromEntries(allData.map(n => [n.name, parseFloat(n.cost)]));

        // Union of all node names
        const names = [...new Set([...Object.keys(staticMap), ...Object.keys(allMap)])].sort();

        if (names.length === 0) {
          nodesGrid.innerHTML = '<span class="nodes-status">No worker nodes reported.</span>';
          return;
        }

        const maxAll    = Math.max(...names.map(n => allMap[n]    ?? 0), 1);
        const maxStatic = Math.max(...names.map(n => staticMap[n] ?? 0), 1);

        nodesGrid.innerHTML = '';
        for (const name of names) {
          const staticCost = staticMap[name] ?? null;
          const allCost    = allMap[name]    ?? null;

          // Progress bar based on total compute share
          const barPct = allCost != null ? Math.round((allCost / maxAll) * 100) : 0;

          const card = document.createElement('div');
          card.className = 'node-card';
          card.innerHTML = `
            <div class="node-name" title="${name}">${name}</div>
            <div class="node-metrics">
              <div class="node-metric">
                <span class="node-metric-label">Static cost/token</span>
                <span class="node-metric-value">${staticCost != null ? staticCost.toFixed(2) + ' GF' : '—'}</span>
              </div>
              <div class="node-metric">
                <span class="node-metric-label">Total compute</span>
                <span class="node-metric-value">${allCost != null ? allCost.toFixed(2) + ' GF' : '—'}</span>
              </div>
            </div>
            <div class="node-bar-wrap">
              <div class="node-bar" style="width: ${barPct}%"></div>
            </div>
          `;
          nodesGrid.appendChild(card);
        }
      } catch (err) {
        // Silently ignore aborts (expected when the 800ms timeout fires) —
        // only show an error for genuine failures on the first load.
        if (err.name !== 'AbortError') {
          nodesGrid.innerHTML = `<span class="nodes-status">⚠ ${err.message}</span>`;
        }
      } finally {
        clearTimeout(timeoutId);
        fetchInFlight = false;
        nodesRefreshBtn.disabled = false;
        nodesRefreshBtn.textContent = '↻ Refresh';
      }
    }

    // ── Polling ───────────────────────────────────────────────────────────────
    let pollTimer = null;

    function startPolling() {
      stopPolling();
      fetchNodeStats();
      pollTimer = setInterval(fetchNodeStats, 1000);
    }

    function stopPolling() {
      if (pollTimer !== null) { clearInterval(pollTimer); pollTimer = null; }
    }

    // Re-fetch (and restart poll) whenever the gateway URL changes (with debounce)
    let gatewayDebounce;
    document.getElementById('gateway-url').addEventListener('input', () => {
      clearTimeout(gatewayDebounce);
      stopPolling();
      gatewayDebounce = setTimeout(startPolling, 600);
    });

    // Start polling on load
    startPolling();

    // ── Auto-resize textarea ──────────────────────────────────────────────────
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    // ── Send on Enter (Shift+Enter = newline) ─────────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Helper: scroll chat to bottom ─────────────────────────────────────────
    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // ── Helper: append a message bubble ──────────────────────────────────────
    function appendBubble(role, text) {
      if (emptyState && emptyState.parentNode) emptyState.remove();

      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      chatArea.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    // ── Helper: show an error ─────────────────────────────────────────────────
    function appendError(msg) {
      if (emptyState && emptyState.parentNode) emptyState.remove();
      const div = document.createElement('div');
      div.className = 'error-row';
      div.textContent = '⚠ ' + msg;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    // ── Main send function ────────────────────────────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      const apiUrl      = document.getElementById('api-url').value.trim();
      const maxTokens   = parseInt(document.getElementById('max-tokens').value) || 512;
      const temperature = parseFloat(document.getElementById('temperature').value) ?? 0.7;

      // Show user bubble
      appendBubble('user', text);

      // Add to history
      history.push({ role: 'user', content: text });

      // Reset input
      userInput.value = '';
      userInput.style.height = 'auto';
      userInput.disabled = true;
      sendBtn.disabled = true;

      // Prepare AI bubble with streaming cursor
      const aiBubble = appendBubble('ai', '');
      const cursor   = document.createElement('span');
      cursor.className = 'cursor';
      aiBubble.appendChild(cursor);

      let fullResponse = '';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: history,
            max_tokens: maxTokens,
            temperature: temperature,
            stream: true,
          }),
        });

        if (!response.ok) {
          let errText = await response.text().catch(() => response.statusText);
          throw new Error(`HTTP ${response.status}: ${errText}`);
        }

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          // Process all complete SSE lines in the buffer
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete last line

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;

            const data = trimmed.slice(5).trim();
            if (data === '[DONE]') break;

            let chunk;
            try { chunk = JSON.parse(data); } catch { continue; }

            const delta = chunk?.choices?.[0]?.delta?.content;
            if (typeof delta === 'string' && delta.length > 0) {
              fullResponse += delta;
              // Update bubble text, keeping cursor at end
              aiBubble.textContent = fullResponse;
              aiBubble.appendChild(cursor);
              scrollToBottom();
            }
          }
        }
      } catch (err) {
        aiBubble.remove();
        appendError(err.message || String(err));
        // Remove last user message from history on error
        history.pop();
      } finally {
        // Remove cursor, finalize
        cursor.remove();
        if (fullResponse) {
          aiBubble.textContent = fullResponse;
          history.push({ role: 'assistant', content: fullResponse });
        }
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
        scrollToBottom();

      }
    }
  </script>
</body>
</html>
